<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f2f0eb;
    --surface: #ffffff;
    --surface2: #f7f5f0;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1917;
    --text2: #6b6860;
    --text3: #a09e98;
    --blue: #2563eb;
    --blue-bg: #eff6ff;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --amber: #d97706;
    --amber-bg: #fffbeb;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --orange: #ea580c;
    --radius: 12px;
    --radius-sm: 7px;
  }
  [data-theme="dark"] {
    --bg: #111110;
    --surface: #1c1c1b;
    --surface2: #242423;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #8a8880;
    --text3: #555350;
    --blue-bg: #1e3a5f;
    --green-bg: #14291d;
    --amber-bg: #2d1f0a;
    --red-bg: #2d1111;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: hidden; }
  body { max-width: 100%; overflow-x: clip; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  .app { max-width: 1380px; margin: 0 auto; padding: 20px 16px; width: 100%; }

  /* TOP BAR */
  .topbar { display: grid; grid-template-columns: auto 1fr; gap: 12px; margin-bottom: 14px; align-items: stretch; min-width: 0; }
  .day-card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 14px 18px; }
  .day-name { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); }
  .day-date { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
  .rating-row { display: flex; gap: 16px; }
  .rating-group label.lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); display: block; margin-bottom: 4px; }
  .radio-strip { display: flex; gap: 2px; align-items: center; }
  .radio-strip input[type=radio] { display: none; }
  .radio-strip label { font-size: 17px; cursor: pointer; padding: 3px 4px; border-radius: 6px; transition: background 0.15s; }
  .radio-strip label:hover { background: var(--surface2); }
  .radio-strip input[type=radio]:checked + label { background: var(--surface2); outline: 2px solid var(--border2); }

  .progress-card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 14px 18px; display: flex; flex-direction: column; justify-content: space-between; }
  .progress-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .prog-controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; min-width: 0; }
  .prog-bar-track { height: 14px; border-radius: 7px; background: var(--surface2); border: 0.5px solid var(--border); overflow: hidden; }
  .prog-bar-fill { height: 100%; border-radius: 7px; transition: width 0.9s ease, background-color 0.9s ease; }
  .prog-meta { display: flex; justify-content: space-between; margin-top: 5px; }

  .toggle-strip { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .chip { padding: 4px 13px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border2); background: var(--surface2); color: var(--text2); transition: all 0.15s; user-select: none; font-family: 'DM Sans', sans-serif; }
  .chip.on { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* MAIN GRID */
  .main-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .lists-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; transition: grid-template-columns 0.2s ease; }
  .lists-grid[data-cols="1"] { grid-template-columns: minmax(0, 1fr); }
  .lists-grid[data-cols="2"] { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .lists-grid[data-cols="3"] { grid-template-columns: repeat(3, minmax(0, 1fr)); }

  /* CARDS */
  .panel { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 14px; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .panel-title { font-size: 13px; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; }
  .pill { font-size: 10px; background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border); border-radius: 10px; padding: 2px 8px; }

  /* BUTTONS */
  btn, button { font-family: 'DM Sans', sans-serif; }
  .btn { display: inline-flex; align-items: center; gap: 4px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 5px 11px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text); transition: all 0.12s; font-family: 'DM Sans', sans-serif; }
  .btn:hover { background: var(--border); }
  .btn:active { transform: scale(0.97); }
  .btn-blue { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-blue:hover { background: #1d4ed8; }
  .btn-green { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-green:hover { background: #15803d; }
  .btn-red { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-red:hover { background: #b91c1c; }
  .btn-xs { padding: 3px 8px; font-size: 11px; }

  /* TASK ITEMS */
  .task-item { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 7px 9px; display: flex; align-items: center; gap: 6px; margin-bottom: 5px; cursor: grab; user-select: none; transition: border-color 0.15s, opacity 0.15s, transform 0.1s; touch-action: none; }
  .task-item:hover { border-color: var(--border2); }
  .task-item:active { cursor: grabbing; }
  .task-item.priority { border-left: 3px solid var(--amber); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .task-item.dragging { opacity: 0.35; transform: scale(0.98); }
  .task-item.drag-over { border-color: var(--blue); background: var(--blue-bg); }
  .task-item.touch-dragging { opacity: 0.35; }
  .task-text { flex: 1; font-size: 12px; color: var(--text); line-height: 1.4; cursor: grab; }
  .task-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.15s; }
  .task-item:hover .task-actions { opacity: 1; }
  .habit-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.15s; }
  .habit-item:hover .habit-actions { opacity: 1; }
  .icon-btn { background: none; border: none; cursor: pointer; padding: 3px 5px; border-radius: 5px; color: var(--text2); display: flex; align-items: center; justify-content: center; transition: background 0.12s, color 0.12s; min-width: 28px; min-height: 28px; }
  .icon-btn:hover { background: var(--border); color: var(--text); }
  .icon-btn.del:hover { background: var(--red-bg); color: var(--red); }
  .touch-ghost { position: fixed; pointer-events: none; z-index: 9999; opacity: 0.85; border-radius: var(--radius-sm); background: var(--surface); border: 1.5px solid var(--blue); padding: 7px 9px; font-size: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
  @media (hover: none) {
    .task-actions { opacity: 1; }
    .habit-actions { opacity: 1; }
  }
  .star-btn { background: none; border: none; cursor: pointer; padding: 3px 4px; line-height: 1; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 5px; transition: background 0.12s; min-width: 28px; min-height: 28px; color: var(--text2); }
  .star-btn:hover { background: var(--border); }

  /* HABITS */
  .habit-item { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 7px 9px; display: flex; align-items: center; gap: 6px; margin-bottom: 5px; transition: border-color 0.15s; }
  .habit-item:hover { border-color: var(--border2); }
  .habit-item.done { background: var(--green-bg); border-color: #86efac; }
  .habit-done-cb { accent-color: var(--green); width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
  .streak-badge { font-size: 10px; background: var(--green-bg); color: var(--green); border: 0.5px solid #86efac; border-radius: 8px; padding: 2px 6px; white-space: nowrap; }

  /* INPUTS */
  input[type=text], input[type=number], input[type=time], textarea, select {
    background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    padding: 6px 9px; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none;
    min-width: 0; max-width: 100%;
  }
  input[type=text]:focus, input[type=number]:focus, textarea:focus { border-color: var(--blue); }
  textarea { resize: vertical; min-height: 56px; width: 100%; }
  input[type=checkbox] { accent-color: var(--blue); width: 14px; height: 14px; cursor: pointer; }

  /* TIMER */
  @keyframes pulse{from{opacity:1;}to{opacity:0.55;}}
  .timer-display { font-family: 'DM Mono', monospace; font-size: 42px; font-weight: 500; color: var(--text); letter-spacing: 3px; white-space: nowrap; line-height: 1; }

  /* PRIVACY */

  /* METRICS */
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
  .metric-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; text-align: center; border: 0.5px solid var(--border); }
  .metric-num { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; }
  .metric-lbl { font-size: 10px; color: var(--text2); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .chart-panel { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; border: 0.5px solid var(--border); }

  /* MAIN NAV TABS */
  .main-tab-bar { display: flex; gap: 6px; margin-bottom: 14px; padding: 5px; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); }
  .main-tab { flex: 1; background: transparent; border: none; border-radius: var(--radius-sm); padding: 10px 16px; font-size: 12px; font-weight: 600; letter-spacing: 0.7px; color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.18s; }
  .main-tab:hover { background: var(--surface2); color: var(--text); }
  .main-tab.active { background: var(--text); color: var(--bg); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

  /* INNER TABS */
  .tab-bar { display: flex; gap: 4px; }
  .tab { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-family: 'DM Sans', sans-serif; transition: all 0.12s; }
  .tab.active { background: var(--text); color: var(--bg); }

  /* HISTORY */
  .history-list { max-height: 220px; overflow-y: auto; }
  .history-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
  .history-date { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 11px; min-width: 72px; }
  .history-quote { flex: 1; color: var(--text2); font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* MODAL */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.42); z-index: 500; align-items: center; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 20px; width: min(340px, calc(100vw - 32px)); }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

  /* THEME TOGGLE */
  .theme-btn { position: fixed; top: 16px; right: 16px; z-index: 100; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--text2); font-family: 'DM Sans', sans-serif; }

  .section-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 4px; }
  .row { display: flex; align-items: center; gap: 7px; }
  .save-btn-wrap { margin-top: 8px; }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .lists-grid,
    .lists-grid[data-cols="1"],
    .lists-grid[data-cols="2"],
    .lists-grid[data-cols="3"] { grid-template-columns: 1fr; }
    .topbar { grid-template-columns: 1fr; }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .task-actions { opacity: 1; }
    .habit-actions { opacity: 1; }
    .toggle-strip { gap: 6px; }
    .chip { padding: 6px 14px; font-size: 13px; }
    .rating-row { gap: 16px; }
    .radio-strip label { font-size: 20px; padding: 4px 5px; }
  }
  @media (max-width: 600px) {
    .app { padding: 10px 10px; }
    .day-card, .progress-card, .panel { padding: 11px 12px; }
    .progress-header { flex-direction: column; align-items: flex-start; }
    .prog-controls { width: 100%; }
    .prog-controls input[type=time] { width: 90px; font-size: 12px; }
    .task-item, .habit-item { padding: 10px 9px; gap: 7px; }
    .task-actions, .habit-actions { opacity: 1; gap: 4px; }
    .btn-xs { padding: 6px 10px; font-size: 12px; min-height: 32px; }
    .star-btn { padding: 4px 5px; min-height: 32px; min-width: 32px; }
    .drag-handle { font-size: 16px; padding: 2px 4px; }
    .panel-header { flex-wrap: wrap; gap: 6px; }
    .panel-header .row { flex-wrap: wrap; }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .tab-bar { flex-wrap: wrap; }
    .rating-row { flex-direction: column; gap: 10px; }
    .toggle-strip { gap: 5px; }
    .chip { font-size: 12px; padding: 5px 12px; }
    .theme-btn { top: 10px; right: 10px; padding: 4px 10px; font-size: 11px; }
    .modal { padding: 16px; }
    .history-date { min-width: 58px; font-size: 10px; }
    .streak-badge { font-size: 9px; padding: 2px 5px; }
  }
  @media (max-width: 480px) {

  }
  @media (max-width: 380px) {
    .app { padding: 8px; }
    .day-card, .progress-card, .panel { padding: 10px; }
    .day-name { font-size: 20px; }
    .btn-xs { padding: 5px 8px; font-size: 11px; }
    .prog-controls input[type=time] { width: 80px; font-size: 11px; padding: 3px 4px; }

  }
</style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="day-card">
      <div class="day-name" id="dayName">—</div>
      <div class="day-date" id="dateStr">—</div>
      <div class="rating-row">
        <div class="rating-group">
          <label class="lbl">Mood</label>
          <div class="radio-strip">
            <input type="radio" name="mood" id="m1" value="1"><label for="m1">😞</label>
            <input type="radio" name="mood" id="m2" value="2"><label for="m2">😕</label>
            <input type="radio" name="mood" id="m3" value="3"><label for="m3">😐</label>
            <input type="radio" name="mood" id="m4" value="4"><label for="m4">🙂</label>
            <input type="radio" name="mood" id="m5" value="5"><label for="m5">😄</label>
          </div>
        </div>
        <div class="rating-group">
          <label class="lbl">Day</label>
          <div class="radio-strip">
            <input type="radio" name="dayR" id="d1" value="1"><label for="d1">💩</label>
            <input type="radio" name="dayR" id="d2" value="2"><label for="d2">😓</label>
            <input type="radio" name="dayR" id="d3" value="3"><label for="d3">😊</label>
            <input type="radio" name="dayR" id="d4" value="4"><label for="d4">🔥</label>
            <input type="radio" name="dayR" id="d5" value="5"><label for="d5">🏆</label>
          </div>
        </div>
      </div>
      <div style="border-top:0.5px solid var(--border);margin-top:10px;padding-top:8px">
        <button onclick="toggleRefl()" id="reflToggleBtn" style="background:none;border:none;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:0.5px;color:var(--text2);font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;padding:0;text-transform:uppercase">
          <span id="reflChevron" style="font-size:10px;transition:transform 0.2s">▶</span> Daily Reflection
        </button>
        <div id="reflWrap" style="display:none;margin-top:10px">
          <div style="margin-bottom:8px">
            <div class="section-lbl">I am grateful for...</div>
            <textarea id="gratefulTx" placeholder="Write here..." oninput="saveRefl()" style="font-size:12px;min-height:48px"></textarea>
          </div>
          <div style="margin-bottom:8px">
            <div class="section-lbl">Greatest accomplishment today</div>
            <textarea id="accomplishTx" placeholder="Write here..." oninput="saveRefl()" style="font-size:12px;min-height:48px"></textarea>
          </div>
          <button class="btn btn-blue" style="width:100%;justify-content:center;font-size:12px" onclick="logEntry()" id="saveEntryBtn">Save today's entry</button>
        </div>
      </div>
    </div>

    <div class="progress-card">
      <div>
        <div class="progress-header">
          <span class="panel-title">DAILY PROGRESS</span>
          <div class="prog-controls">
            <span style="font-size:11px;color:var(--text2)">Start</span>
            <input type="time" id="wStart" value="09:00" style="width:82px;font-size:11px;padding:3px 6px" onchange="updateProg()">
            <span style="font-size:11px;color:var(--text2)">End</span>
            <input type="time" id="wEnd" value="17:00" style="width:82px;font-size:11px;padding:3px 6px" onchange="updateProg()">

          </div>
        </div>
        <div class="prog-bar-track"><div class="prog-bar-fill" id="pFill" style="width:0%;background:#16a34a"></div></div>
        <div class="prog-meta">
          <span style="font-size:11px;color:var(--text3)" id="pPct">0%</span>
          <span style="font-size:11px;color:var(--text3)" id="pLeft">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- FOCUS TIMER -->
  <div class="panel" style="margin-bottom:12px;text-align:center">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span class="panel-title">FOCUS TIMER</span>
      <input type="text" id="timerInput" value="00:25:00"
        maxlength="8"
        style="width:110px;font-size:14px;font-family:'DM Mono',monospace;text-align:center;letter-spacing:2px;padding:4px 8px"
        placeholder="hh:mm:ss"
        onchange="timerInputChanged()"
        onblur="timerInputChanged()">
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;padding:4px 8px">
      <div class="timer-display" id="timerDisp">25:00</div>
      <svg id="timerSvg" width="60" height="60" viewBox="0 0 60 60" style="flex-shrink:0">
        <circle id="timerTrack" cx="30" cy="30" r="28" fill="#e5e3de"/>
        <path id="timerArc" fill="#d97706"/>
      </svg>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px">
      <button class="btn" onclick="timerReset()">Reset</button>
      <button class="btn btn-green" id="timerBtn" onclick="timerToggle()">Start</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-grid">
    <div>
      <!-- Main tab bar -->
      <div class="main-tab-bar">
        <button class="main-tab active" id="mainTabDashboard" onclick="switchMainTab('dashboard')">DASHBOARD</button>
        <button class="main-tab" id="mainTabMetrics" onclick="switchMainTab('metrics')">METRICS</button>
      </div>

      <!-- Dashboard tab -->
      <div id="mainPanelDashboard">
        <div class="panel" style="margin-bottom:12px;padding-bottom:10px">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">
            <span class="panel-title">TO DO LISTS</span>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:11px;font-weight:600;letter-spacing:0.4px;color:var(--text2)">SHOW:</span>
              <button class="chip on" id="tW" onclick="toggleCol('work')">Work Day</button>
              <button class="chip on" id="tP" onclick="toggleCol('personal')">Personal</button>
              <button class="chip on" id="tH" onclick="toggleCol('habits')">Daily Habits</button>
            </div>
          </div>
          <div class="lists-grid" id="listsGrid">
          <!-- Work -->
          <div id="colWork" class="panel">
            <div class="panel-header">
              <span class="panel-title">WORK DAY</span>
              <div class="row"><span class="pill" id="cWork">0 tasks</span><button class="btn btn-xs btn-blue" onclick="openAdd('work')">+ Add</button></div>
            </div>
            <div id="workList"></div>
          </div>
          <!-- Personal -->
          <div id="colPersonal" class="panel">
            <div class="panel-header">
              <span class="panel-title">PERSONAL</span>

<script>
const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const now=new Date();
const todayKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
document.getElementById('dayName').textContent=DAYS[now.getDay()].toUpperCase();
document.getElementById('dateStr').textContent=`${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

const SK={tasks:'dpd_tasks',habits:'dpd_habits',history:'dpd_history',settings:'dpd_settings',refl:'dpd_refl',nextid:'dpd_nextid',mood:'dpd_todayMood',day:'dpd_todayDay',theme:'dpd_theme'};
function load(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let tasks=load(SK.tasks,{
  work:[{id:1,text:'Review project brief',star:true},{id:2,text:'Team standup',star:true},{id:3,text:'Send weekly report',star:false}],
  personal:[{id:1,text:'Grocery shopping',star:true},{id:2,text:'Call family',star:false},{id:3,text:'Read 30 min',star:false}]
});
let habits=load(SK.habits,[
  {id:1,text:'Morning walk',done:false,streak:3,lastDone:''},
  {id:2,text:'Drink 8 glasses water',done:false,streak:7,lastDone:''},
  {id:3,text:'Journal entry',done:false,streak:1,lastDone:''}
]);
let history=load(SK.history,[]);
let settings=load(SK.settings,{wStart:'09:00',wEnd:'17:00',priv:false});
let refl=load(SK.refl,{grateful:'',accomplish:''});
let nextId=load(SK.nextid,{work:10,personal:10,habits:10});
let vis={work:true,personal:true,habits:true};
let addTarget='',editTarget={list:'',id:0};
let timerTotal=25*60,timerLeft=25*60,timerRunning=false,timerIv=null;
let moodChart=null,dayChart=null;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getTop3(list){return tasks[list].filter(t=>t.star).map(t=>t.id).slice(0,3);}

function renderTasks(list,cid,countId){
  const el=document.getElementById(cid);
  const top3=getTop3(list);
  el.innerHTML='';
  const sorted=[...tasks[list]].sort((a,b)=>(b.star?1:0)-(a.star?1:0));
  sorted.forEach((t,i)=>{
    const isP=top3.includes(t.id);
    const d=document.createElement('div');
    d.className='task-item'+(isP?' priority':'');
    d.draggable=true;d.dataset.i=i;d.dataset.list=list;
    d.innerHTML=`<input type="checkbox" style="flex-shrink:0;cursor:pointer" onmousedown="event.stopPropagation()" onchange="completeTask('${list}',${t.id})"><span class="task-text">${esc(t.text)}</span><button class="star-btn" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="toggleStar('${list}',${t.id})" title="Mark as top priority">${isP?'<svg width="14" height="14" viewBox="0 0 24 24" fill="#d97706" stroke="#d97706" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'}</button><div class="task-actions"><button class="icon-btn" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="openEdit('${list}',${t.id})" title="Edit"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="icon-btn del" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="delTask('${list}',${t.id})" title="Delete"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></div>`;
    addDrag(d,list);el.appendChild(d);
  });
  document.getElementById(countId).textContent=`${tasks[list].length} tasks · ${top3.length} ★`;
}

function renderHabits(){
  const el=document.getElementById('habitList');el.innerHTML='';
  habits.forEach(h=>{
    const d=document.createElement('div');
    d.className='habit-item'+(h.done?' done':'');
    d.innerHTML=`<input type="checkbox" class="habit-done-cb" ${h.done?'checked':''} onchange="toggleHabit(${h.id})"><span style="flex:1;font-size:12px;color:var(--text)">${esc(h.text)}</span><span class="streak-badge">🔥${h.streak}d</span><div class="habit-actions"><button class="icon-btn" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="openEdit('habits',${h.id})" title="Edit"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="icon-btn del" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="delHabit(${h.id})" title="Delete"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></div>`;
    el.appendChild(d);
  });
}

function moveTask(list,idx,dir){
  const arr=tasks[list];
  const to=idx+dir;
  if(to<0||to>=arr.length)return;
  const [item]=arr.splice(idx,1);
  arr.splice(to,0,item);
  save(SK.tasks,tasks);render();
}

function render(){renderTasks('work','workList','cWork');renderTasks('personal','personalList','cPersonal');renderHabits();updateMetrics();}

function completeTask(list,id){tasks[list]=tasks[list].filter(t=>t.id!==id);save(SK.tasks,tasks);render();}
function delTask(list,id){tasks[list]=tasks[list].filter(t=>t.id!==id);save(SK.tasks,tasks);render();}
function toggleStar(list,id){
  const t=tasks[list].find(t=>t.id===id);if(!t)return;
  const top3=getTop3(list);
  if(!t.star&&top3.length>=3){const o=tasks[list].find(x=>x.id===top3[2]);if(o)o.star=false;}
  t.star=!t.star;
  save(SK.tasks,tasks);render();
}
function toggleHabit(id){
  const h=habits.find(h=>h.id===id);if(!h)return;
  h.done=!h.done;
  if(h.done){if(h.lastDone!==todayKey){h.streak++;h.lastDone=todayKey;}}
  else{if(h.lastDone===todayKey){h.streak=Math.max(0,h.streak-1);h.lastDone='';}}
  save(SK.habits,habits);renderHabits();
}
function delHabit(id){habits=habits.filter(h=>h.id!==id);save(SK.habits,habits);renderHabits();}

function openAdd(list){addTarget=list;document.getElementById('addModalTitle').textContent=list==='habits'?'Add habit':'Add task';document.getElementById('addInput').value='';document.getElementById('addModal').classList.add('open');setTimeout(()=>document.getElementById('addInput').focus(),60);}
function confirmAdd(){
  const v=document.getElementById('addInput').value.trim();if(!v)return;
  if(addTarget==='habits'){habits.push({id:nextId.habits++,text:v,done:false,streak:0,lastDone:''});save(SK.habits,habits);}
  else{tasks[addTarget].push({id:nextId[addTarget]++,text:v,star:false});save(SK.tasks,tasks);}
  save(SK.nextid,nextId);closeModal('add');render();
}
function openEdit(list,id){
  editTarget={list,id};
  const src=list==='habits'?habits.find(h=>h.id===id):tasks[list].find(t=>t.id===id);
  if(!src)return;
  document.getElementById('editInput').value=src.text;
  document.getElementById('editModalTitle').textContent=list==='habits'?'Edit habit':'Edit task';
  const streakRow=document.getElementById('editStreakRow');
  if(list==='habits'){
    streakRow.style.display='';
    document.getElementById('editStreakInput').value=src.streak||0;
  } else {
    streakRow.style.display='none';
  }
  document.getElementById('editModal').classList.add('open');
  setTimeout(()=>document.getElementById('editInput').focus(),60);
}
function confirmEdit(){
  const v=document.getElementById('editInput').value.trim();if(!v)return;
  if(editTarget.list==='habits'){
    const h=habits.find(h=>h.id===editTarget.id);
    if(h){
      h.text=v;
      const s=parseInt(document.getElementById('editStreakInput').value);
      h.streak=isNaN(s)?h.streak:Math.max(0,s);
    }
    save(SK.habits,habits);
  } else {
    const t=tasks[editTarget.list].find(t=>t.id===editTarget.id);
    if(t)t.text=v;
    save(SK.tasks,tasks);
  }
  closeModal('edit');render();
}
function closeModal(w){document.getElementById(w+'Modal').classList.remove('open');}

function toggleCol(which){
  vis[which]=!vis[which];
  const m={work:'colWork',personal:'colPersonal',habits:'colHabits'};
  const t={work:'tW',personal:'tP',habits:'tH'};
  document.getElementById(m[which]).style.display=vis[which]?'':'none';
  document.getElementById(t[which]).classList.toggle('on',vis[which]);
  const count=Object.values(vis).filter(Boolean).length;
  const grid=document.getElementById('listsGrid');
  grid.setAttribute('data-cols',count);
  grid.style.display=count===0?'none':'grid';
}

let dragSrc=null;
let touchGhost=null,touchDragSrc=null,touchList=null;

function addDrag(el,list){
  /* ---- DESKTOP DRAG ---- */
  el.addEventListener('dragstart',e=>{
    if(e.target.closest('.icon-btn,.star-btn,input')){e.preventDefault();return;}
    dragSrc={i:+el.dataset.i,list};
    setTimeout(()=>el.classList.add('dragging'),0);
  });
  el.addEventListener('dragend',()=>{
    el.classList.remove('dragging');
    document.querySelectorAll('.task-item').forEach(x=>x.classList.remove('drag-over'));
  });
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
  el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('drag-over');
    if(!dragSrc||dragSrc.list!==list)return;
    const to=+el.dataset.i;if(dragSrc.i===to)return;
    const [item]=tasks[list].splice(dragSrc.i,1);tasks[list].splice(to,0,item);
    save(SK.tasks,tasks);render();
  });

  /* ---- TOUCH DRAG ---- */
  let holdTimer=null,didDrag=false;
  el.addEventListener('touchstart',e=>{
    if(e.target.closest('.icon-btn,.star-btn,input')){return;}
    didDrag=false;
    holdTimer=setTimeout(()=>{
      didDrag=false;
      touchDragSrc={i:+el.dataset.i,list};
      touchList=list;
      el.classList.add('touch-dragging');
      const t0=e.touches[0];
      if(!touchGhost){
        touchGhost=document.createElement('div');
        touchGhost.className='touch-ghost';
        document.body.appendChild(touchGhost);
      }
      touchGhost.textContent=tasks[list][+el.dataset.i]?.text||'';
      touchGhost.style.display='block';
      touchGhost.style.left=(t0.clientX+12)+'px';
      touchGhost.style.top=(t0.clientY-20)+'px';
    },300);
  },{passive:true});

  el.addEventListener('touchmove',e=>{
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
    if(!touchDragSrc)return;
    didDrag=true;
    e.preventDefault();
    const t=e.touches[0];
    if(touchGhost){
      touchGhost.style.left=(t.clientX+12)+'px';
      touchGhost.style.top=(t.clientY-20)+'px';
    }
    document.querySelectorAll('.task-item').forEach(x=>x.classList.remove('drag-over'));
    const under=document.elementFromPoint(t.clientX,t.clientY);
    const target=under?.closest('.task-item');
    if(target&&target!==el&&target.dataset.list===list) target.classList.add('drag-over');
  },{passive:false});

  el.addEventListener('touchend',e=>{
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
    if(!touchDragSrc){return;}
    const t=e.changedTouches[0];
    const under=document.elementFromPoint(t.clientX,t.clientY);
    const target=under?.closest('.task-item');
    if(target&&target.dataset.list===list){
      const to=+target.dataset.i;
      const from=touchDragSrc.i;
      if(from!==to){
        const [item]=tasks[list].splice(from,1);
        tasks[list].splice(to,0,item);
        save(SK.tasks,tasks);render();
      }
    }
    document.querySelectorAll('.task-item').forEach(x=>x.classList.remove('drag-over','touch-dragging'));
    if(touchGhost)touchGhost.style.display='none';
    touchDragSrc=null;touchList=null;
  },{passive:true});
}

function updateProg(){
  const n=new Date();
  const [sh,sm]=document.getElementById('wStart').value.split(':').map(Number);
  const [eh,em]=document.getElementById('wEnd').value.split(':').map(Number);
  const sM=sh*60+sm,eM=eh*60+em,nM=n.getHours()*60+n.getMinutes();
  const pct=Math.max(0,Math.min(1,(nM-sM)/(eM-sM)));
  document.getElementById('pFill').style.width=Math.round(pct*100)+'%';
  document.getElementById('pPct').textContent=Math.round(pct*100)+'% of workday elapsed';
  const ml=eM-nM;
  document.getElementById('pLeft').textContent=ml>0?`${Math.floor(ml/60)}h ${ml%60}m remaining`:'Workday complete';
  const c=pct>0.9?'#dc2626':pct>0.75?'#d97706':pct>0.5?'#ca8a04':'#16a34a';
  document.getElementById('pFill').style.backgroundColor=c;
  settings.wStart=document.getElementById('wStart').value;
  settings.wEnd=document.getElementById('wEnd').value;
  save(SK.settings,settings);
}
document.getElementById('wStart').value=settings.wStart||'09:00';
document.getElementById('wEnd').value=settings.wEnd||'17:00';
setInterval(updateProg,60000);updateProg();

let audioCtx=null;
function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
document.addEventListener('click',()=>{
  try{const c=getAudioCtx();if(c.state==='suspended')c.resume();}catch(e){}
},{passive:true});

let chimeLooping=false;
let chimeNodes=[];

function stopChime(){
  chimeLooping=false;
  chimeNodes.forEach(n=>{try{n.stop();}catch(e){}});
  chimeNodes=[];
  document.getElementById('timerDisp').style.color='';
  timerReset();
}

function playChime(){
  try{
    const ctx=getAudioCtx();
    if(ctx.state==='suspended'){ctx.resume().then(()=>_startChimeLoop(ctx));}
    else{_startChimeLoop(ctx);}
  }catch(e){}
}

function _startChimeLoop(ctx){
  chimeLooping=true;
  const btn=document.getElementById('timerBtn');
  btn.textContent='Stop chime';
  btn.className='btn btn-red';
  btn.onclick=stopChime;
  _doChime(ctx);
}

function _doChime(ctx){
  if(!chimeLooping) return;
  const notes=[523.25,659.25,783.99,1046.50];
  const times=[0,0.18,0.36,0.56];
  const loopDuration=1.6;
  notes.forEach((freq,i)=>{
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';osc.frequency.value=freq;
    const t=ctx.currentTime+times[i];
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.42,t+0.04);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.8);
    osc.start(t);osc.stop(t+0.85);
    chimeNodes.push(osc);
  });
  setTimeout(()=>_doChime(ctx), loopDuration*1000);
}

function timerToggle(){
  if(timerRunning){clearInterval(timerIv);timerRunning=false;document.getElementById('timerBtn').textContent='Resume';}
  else{
    if(timerLeft<=0){timerReset();return;}
    timerRunning=true;document.getElementById('timerBtn').textContent='Pause';
    timerIv=setInterval(()=>{
      timerLeft--;updateTimerUI();
      if(timerLeft<=0){
        clearInterval(timerIv);timerRunning=false;
        document.getElementById('timerBtn').textContent='Start';
        playChime();
        const d=document.getElementById('timerDisp');
        d.style.color='var(--green)';
        setTimeout(()=>d.style.color='',3000);
      }
    },1000);
  }
}
function parseTimerInput(){
  const raw=document.getElementById('timerInput').value.replace(/[^0-9]/g,'').padStart(6,'0').slice(-6);
  const h=parseInt(raw.slice(0,2))||0;
  const m=parseInt(raw.slice(2,4))||0;
  const s=parseInt(raw.slice(4,6))||0;
  return h*3600+m*60+s;
}

function formatTimerInput(totalSecs){
  const h=Math.floor(totalSecs/3600);
  const m=Math.floor((totalSecs%3600)/60);
  const s=totalSecs%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function timerInputChanged(){
  const raw=document.getElementById('timerInput').value.replace(/[^0-9]/g,'').padStart(6,'0').slice(-6);
  const h=parseInt(raw.slice(0,2))||0;
  const m=Math.min(59,parseInt(raw.slice(2,4))||0);
  const s=Math.min(59,parseInt(raw.slice(4,6))||0);
  document.getElementById('timerInput').value=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  timerReset();
}

function timerReset(){
  clearInterval(timerIv);timerRunning=false;
  if(chimeLooping) stopChime();
  const btn=document.getElementById('timerBtn');
  btn.onclick=timerToggle;
  btn.className='btn btn-green';
  btn.textContent='Start';
  timerTotal=parseTimerInput()||60;
  timerLeft=timerTotal;
  updateTimerUI();
}
function updateTimerUI(){
  const h=Math.floor(timerLeft/3600);
  const m=Math.floor((timerLeft%3600)/60);
  const s=timerLeft%60;
  const disp=h>0
    ?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    :`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('timerDisp').textContent=disp;
  drawPie();
}
function drawPie(){
  const arc=document.getElementById('timerArc');
  const track=document.getElementById('timerTrack');
  if(!arc)return;
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const pct=timerLeft/Math.max(1,timerTotal);
  track.setAttribute('fill',dark?'#2a2a28':'#e5e3de');
  arc.setAttribute('fill',pct>0.3?'#d97706':'#dc2626');
  if(pct<=0){arc.setAttribute('d','');return;}
  if(pct>=1){
    arc.setAttribute('d','M30,30 m-28,0 a28,28 0 1,1 56,0 a28,28 0 1,1 -56,0');
    return;
  }
  const angle=pct*2*Math.PI;
  const x=30+28*Math.sin(angle);
  const y=30-28*Math.cos(angle);
  const large=pct>0.5?1:0;
  arc.setAttribute('d',`M30,30 L30,2 A28,28 0 ${large},1 ${x.toFixed(3)},${y.toFixed(3)} Z`);
}
updateTimerUI();

function saveRefl(){refl.grateful=document.getElementById('gratefulTx').value;refl.accomplish=document.getElementById('accomplishTx').value;save(SK.refl,refl);}
function toggleRefl(){
  const wrap=document.getElementById('reflWrap');
  const chevron=document.getElementById('reflChevron');
  const open=wrap.style.display==='none'||wrap.style.display==='';
  wrap.style.display=open?'block':'none';
  chevron.style.transform=open?'rotate(90deg)':'rotate(0deg)';
  settings.reflOpen=open;save(SK.settings,settings);
}
if(settings.reflOpen){
  document.getElementById('reflWrap').style.display='block';
  document.getElementById('reflChevron').style.transform='rotate(90deg)';
}
document.getElementById('gratefulTx').value=refl.grateful||'';
document.getElementById('accomplishTx').value=refl.accomplish||'';

function logEntry(){
  const mood=+(document.querySelector('input[name=mood]:checked')?.value||0);
  const dayR=+(document.querySelector('input[name=dayR]:checked')?.value||0);
  if(!mood||!dayR){alert('Please set your mood and day rating before saving.');return;}
  const entry={date:todayKey,mood,day:dayR,grateful:refl.grateful,accomplish:refl.accomplish,timestamp:Date.now()};
  const idx=history.findIndex(h=>h.date===todayKey);
  if(idx>=0)history[idx]=entry;else history.push(entry);
  history.sort((a,b)=>a.date.localeCompare(b.date));
  save(SK.history,history);updateMetrics();
  const btn=document.getElementById('saveEntryBtn');
  btn.textContent='✓ Saved!';btn.style.background='#16a34a';
  setTimeout(()=>{btn.textContent="Save today's entry";btn.style.background='';},2000);
}

function updateMetrics(){
  const recent=history.slice(-30);
  const avgMood=recent.length?recent.reduce((a,h)=>a+h.mood,0)/recent.length:null;
  const avgDay=recent.length?recent.reduce((a,h)=>a+h.day,0)/recent.length:null;
  document.getElementById('mEntries').textContent=history.length;
  document.getElementById('mAvgMood').textContent=avgMood?avgMood.toFixed(1):'—';
  document.getElementById('mAvgDay').textContent=avgDay?avgDay.toFixed(1):'—';
  let streak=0;const sorted=[...history].sort((a,b)=>b.date.localeCompare(a.date));
  let check=todayKey;
  for(const h of sorted){if(h.date===check){streak++;const d=new Date(check);d.setDate(d.getDate()-1);check=d.toISOString().slice(0,10);}else if(h.date<check)break;}
  document.getElementById('mStreak').textContent=streak;
  buildCharts(recent);buildHistory();
}

function buildCharts(data){
  const labels=data.map(h=>h.date.slice(5));
  const moods=data.map(h=>h.mood);
  const days=data.map(h=>h.day);
  const opts=(color,d)=>({type:'line',data:{labels,datasets:[{data:d,borderColor:color,backgroundColor:color+'22',fill:true,tension:0.35,pointRadius:2,borderWidth:2}]},options:{animation:false,plugins:{legend:{display:false}},scales:{y:{min:1,max:5,ticks:{stepSize:1,font:{size:9},color:'#a09e98'},grid:{color:'rgba(128,128,128,0.08)'}},x:{ticks:{font:{size:9},maxTicksLimit:6,color:'#a09e98'},grid:{display:false}}}}});
  if(moodChart)moodChart.destroy();if(dayChart)dayChart.destroy();
  moodChart=new Chart(document.getElementById('moodCanvas').getContext('2d'),opts('#2563eb',moods));
  dayChart=new Chart(document.getElementById('dayCanvas').getContext('2d'),opts('#16a34a',days));
}

function buildHistory(){
  const el=document.getElementById('historyRows');
  const me=['','😞','😕','😐','🙂','😄'],de=['','💩','😓','😊','🔥','🏆'];
  if(!history.length){el.innerHTML='<div style="font-size:12px;color:var(--text3);padding:10px 0">No entries yet — save your first entry!</div>';return;}
  el.innerHTML=[...history].reverse().map(h=>`<div class="history-row"><span class="history-date">${h.date}</span><span style="font-size:14px">${me[h.mood]}</span><span style="font-size:14px">${de[h.day]}</span><span class="history-quote">${h.grateful?'"'+esc(h.grateful.slice(0,50))+(h.grateful.length>50?'…':'')+ '"':''}</span></div>`).join('');
}

function switchTab(which){
  document.getElementById('panelCharts').style.display=which==='charts'?'':'none';
  document.getElementById('panelHistory').style.display=which==='history'?'':'none';
  document.getElementById('tabCharts').classList.toggle('active',which==='charts');
  document.getElementById('tabHistory').classList.toggle('active',which==='history');
}

function switchMainTab(which){
  document.getElementById('mainPanelDashboard').style.display=which==='dashboard'?'':'none';
  document.getElementById('mainPanelMetrics').style.display=which==='metrics'?'':'none';
  document.getElementById('mainTabDashboard').classList.toggle('active',which==='dashboard');
  document.getElementById('mainTabMetrics').classList.toggle('active',which==='metrics');
  if(which==='metrics') updateMetrics();
}

function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('themeBtn').textContent=isDark?'🌙 Dark':'☀️ Light';
  save(SK.theme,isDark?'light':'dark');
  drawPie();
}
const savedTheme=load(SK.theme,'light');
if(savedTheme==='dark'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('themeBtn').textContent='☀️ Light';}

const moodSaved=load(SK.mood,null);const daySaved=load(SK.day,null);
if(moodSaved){const r=document.getElementById('m'+moodSaved);if(r)r.checked=true;}
if(daySaved){const r=document.getElementById('d'+daySaved);if(r)r.checked=true;}
document.querySelectorAll('input[name=mood]').forEach(r=>r.addEventListener('change',()=>save(SK.mood,r.value)));
document.querySelectorAll('input[name=dayR]').forEach(r=>r.addEventListener('change',()=>save(SK.day,r.value)));

render();
</script>
